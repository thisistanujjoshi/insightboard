name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  data-service:
    name: Data service tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install & test
        working-directory: src/data-service
        run: |
          pip install -e ".[dev]"
          python -m pytest -q

  dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install & build
        working-directory: src/dashboard
        run: |
          npm ci
          npm run build

  admin:
    name: Admin back office build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Test
        run: dotnet test tests/Admin.Tests -c Release
