name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  admin:
    name: Admin back office build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Test
        run: dotnet test tests/Admin.Tests -c Release
